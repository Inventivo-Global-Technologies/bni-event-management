<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event - EventPro</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #e8622a;
            --bg: #f7f5f0;
            --card: #ffffff;
            --text: #1a1a2e;
            --muted: #6b6b7b;
            --border: #e2ddd6;
            --sidebar-w: 248px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        
        .sidebar {
            width: var(--sidebar-w);
            background: var(--primary);
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            padding: 20px 0;
            overflow-y: auto;
        }
        
        .sidebar-logo {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }
        
        .sidebar-logo h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            color: #fff;
        }
        
        .sidebar-logo h1 span {
            color: var(--accent);
        }
        
        .nav {
            list-style: none;
            padding: 0 10px;
        }
        
        .nav-item {
            padding: 12px 20px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .nav-item a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            display: block;
            font-size: 14px;
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .nav-item.active {
            background: rgba(232, 98, 42, 0.2);
        }
        
        .main {
            margin-left: var(--sidebar-w);
        }
        
        .topbar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .content {
            padding: 32px;
        }
        
        .form-container {
            max-width: 600px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }
        
        input[type="text"],
        input[type="datetime-local"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: 0.2s;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232, 98, 42, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .form-buttons {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
            flex: 1;
            text-align: center;
        }
        
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #cf5220;
        }
        
        .btn-cancel {
            background: transparent;
            color: var(--muted);
            border: 1.5px solid var(--border);
        }
        
        .btn-cancel:hover {
            background: var(--bg);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <h1>Event<span>Pro</span></h1>
        </div>
        <ul class="nav">
            <li class="nav-item">
                <a href="{% url 'home' %}">Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="{% url 'event_list' %}">All Events</a>
            </li>
            <li class="nav-item active">
                <a href="{% url 'event_create' %}">Create Event</a>
            </li>
        </ul>
    </div>
    
    <div class="main">
        <div class="topbar">
            <h1 style="font-size: 24px; font-weight: 600;">Create New Event</h1>
        </div>
        
        <div class="content">
            <div class="form-container">
                <form method="POST">
                    {% csrf_token %}
                    
                    {% if messages %}
                    {% for message in messages %}
                    <div style="padding: 12px; border-radius: 8px; margin-bottom: 20px; background: {% if message.tags == 'error' %}#ffebee{% else %}#e8f5e9{% endif %}; color: {% if message.tags == 'error' %}#c62828{% else %}#2e7d32{% endif %};">
                        {{ message }}
                    </div>
                    {% endfor %}
                    {% endif %}
                    
                    <div class="form-group">
                        <label for="title">Event Title *</label>
                        <input type="text" id="title" name="title" required placeholder="Enter event title">
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Description *</label>
                        <textarea id="description" name="description" required placeholder="Enter event description"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="location">Location *</label>
                        <input type="text" id="location" name="location" required placeholder="Enter event location">
                    </div>
                    
                    <div class="form-group">
                        <label for="start_date">Start Date & Time *</label>
                        <input type="datetime-local" id="start_date" name="start_date" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="end_date">End Date & Time *</label>
                        <input type="datetime-local" id="end_date" name="end_date" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="capacity">Capacity *</label>
                        <input type="number" id="capacity" name="capacity" required min="1" placeholder="Enter max attendees">
                    </div>
                    
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status">
                            <option value="upcoming">Upcoming</option>
                            <option value="ongoing">Ongoing</option>
                            <option value="completed">Completed</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                    
                    <div class="form-buttons">
                        <button type="submit" class="btn btn-primary">Create Event</button>
                        <a href="{% url 'event_list' %}" class="btn btn-cancel">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
